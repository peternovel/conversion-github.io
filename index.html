<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador GeoJSON con Ubicación - Mapbox</title>
    
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.3.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.3.1/mapbox-gl.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; display: flex; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #sidebar {
            width: 320px;
            height: 100vh;
            background-color: #003399;
            color: white;
            padding: 25px;
            z-index: 1;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        #sidebar h2 { margin-top: 0; font-size: 1.5rem; }
        #sidebar p { font-size: 0.9rem; opacity: 0.9; line-height: 1.4; }
        #map { flex-grow: 1; height: 100vh; }

        .upload-btn {
            display: block;
            background-color: #00d4ff;
            color: #002266;
            border: none;
            padding: 12px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin: 20px 0;
            text-align: center;
            transition: background 0.3s;
        }

        .upload-btn:hover { background-color: #ffffff; }
        input[type="file"] { display: none; }

        .filter-group {
            margin-top: 10px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        .filter-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        .filter-item input { margin-right: 10px; width: 18px; height: 18px; cursor: pointer; }
        .filter-item label { cursor: pointer; }

        /* Ajuste para móviles */
        @media (max-width: 600px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; order: 2; }
            #map { height: 60vh; order: 1; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Visualizar el levantamiento</h2>
    <p>Carga el archivo levantado exportado json.</p>
    
    <label class="upload-btn" for="geojson-input">
        Cargar archivo json
    </label>
    <input type="file" id="geojson-input" accept=".geojson,.json">

    <div class="filter-group">
        <strong>Filtrar por Equipo:</strong>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 10px 0;">
        
        <div class="filter-item">
            <input type="checkbox" class="filter-check" value="Partida principal" id="c1" checked>
            <label for="c1">Partida principal</label>
        </div>
        <div class="filter-item">
            <input type="checkbox" class="filter-check" value="Seccionador" id="c2" checked>
            <label for="c2">Seccionador</label>
        </div>
        <div class="filter-item">
            <input type="checkbox" class="filter-check" value="Transformador" id="c3" checked>
            <label for="c3">Transformador</label>
        </div>
        <div class="filter-item">
            <input type="checkbox" class="filter-check" value="Medicion MT" id="c4" checked>
            <label for="c4">Medición MT</label>
        </div>
        <div class="filter-item">
            <input type="checkbox" class="filter-check" value="Banco de condensadores" id="c5" checked>
            <label for="c5">Banco de condensadores</label>
        </div>
        <div class="filter-item">
            <input type="checkbox" class="filter-check" value="Sin equipo" id="c6" checked>
            <label for="c6">Sin equipo</label>
        </div>
    </div>
    <p style="margin-top: 20px;">Por Pedro Novelino</p>
</div>

<div id="map"></div>

<script>
    // Inicializar Base de Datos Dexie
    const db = new Dexie("GeoJSON_Map_DB");
    db.version(1).stores({
        features: '++id, equipo' 
    });

    // Configuración Mapbox
    mapboxgl.accessToken = 'pk.eyJ1IjoicGV0ZXJub3ZlbCIsImEiOiJjaWdyZm9tdHcwMXl2djFrb2xoMmdvOTMyIn0.4cQYxMt9fl5gDtvDmJz_1w';
    
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/light-v10', 
        center: [-68.31, 9.91], 
        zoom: 12
    });

    // --- CONTROLES ---

    // Botones de Zoom
    map.addControl(new mapboxgl.NavigationControl());

    // Botón de ubicación actual (GPS)
    const geolocate = new mapboxgl.GeolocateControl({
        positionOptions: {
            enableHighAccuracy: true
        },
        trackUserLocation: true, // Seguir movimiento
        showUserHeading: true    // Mostrar dirección (brújula)
    });
    map.addControl(geolocate);

    // Carga de archivo y conversión a BD
    document.getElementById('geojson-input').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(event) {
            try {
                const data = JSON.parse(event.target.result);
                let features = data.features || [];

                await db.features.clear();
                const itemsToStore = features.map(f => ({
                    geometry: f.geometry,
                    properties: f.properties,
                    equipo: f.properties.equipo 
                }));
                
                await db.features.bulkAdd(itemsToStore);
                consultarYGraficar(true); 
                
            } catch (err) {
                alert("Error al procesar el archivo.");
                console.error(err);
            }
        };
        reader.readAsText(file);
    });

    // Escuchar cambios en checkboxes
    document.querySelectorAll('.filter-check').forEach(ck => {
        ck.addEventListener('change', () => consultarYGraficar(false));
    });

    async function consultarYGraficar(debeAjustarZoom = false) {
        const selectedEquipos = Array.from(document.querySelectorAll('.filter-check:checked'))
                                     .map(c => c.value);

        const records = await db.features
                                .where('equipo')
                                .anyOf(selectedEquipos)
                                .toArray();

        const geojson = {
            type: 'FeatureCollection',
            features: records.map(r => ({
                type: 'Feature',
                geometry: r.geometry,
                properties: r.properties
            }))
        };

        renderGeoJSON(geojson, debeAjustarZoom);
    }

    function renderGeoJSON(data, debeAjustarZoom) {
        const sourceId = 'user-data';

        if (map.getSource(sourceId)) {
            map.getSource(sourceId).setData(data);
        } else {
            map.addSource(sourceId, { type: 'geojson', data: data });

            map.addLayer({
                id: 'route-points',
                type: 'circle',
                source: sourceId,
                paint: {
                    'circle-radius': 12,
                    'circle-color': '#ff5500',
                    'circle-stroke-width': 2,
                    'circle-stroke-color': '#ffffff'
                }
            });

            map.addLayer({
                id: 'point-labels',
                type: 'symbol',
                source: sourceId,
                layout: {
                    'text-field': ['get', 'id'],
                    'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
                    'text-size': 11,
                    'text-allow-overlap': true
                },
                paint: { 'text-color': '#ffffff' }
            });
        }

        if (debeAjustarZoom && data.features.length > 0) {
            const bounds = new mapboxgl.LngLatBounds();
            data.features.forEach(f => bounds.extend(f.geometry.coordinates));
            map.fitBounds(bounds, { padding: 60, maxZoom: 15 });
        }
    }
</script>

</body>
</html>
