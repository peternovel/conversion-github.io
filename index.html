<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Captura de Inventario de Campo</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --bg-color: #f8f9fa;
            --success-color: #28a745;
        }
        body { font-family: sans-serif; margin: 0; padding: 10px; background-color: var(--bg-color); padding-bottom: 70px; }
        .container { max-width: 600px; margin: auto; }
        
        /* Navegacion */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Formulario */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input[readonly] { background-color: #e9ecef; color: #495057; }
        
        /* --- NUEVO ESTILO GEOLOCALIZACION --- */
        /* Contenedor para los inputs en una fila */
        .geo-inputs-row { 
            display: flex; 
            gap: 5px; 
            margin-bottom: 10px; /* Espacio antes del boton */
        }
        #coordenadas { flex: 3; font-size: 14px; } /* Coordenadas mas anchas */
        #precision { flex: 1; text-align: center; font-size: 14px; } /* Precision mas estrecha */

        /* Boton GPS grande debajo */
        .geo-btn-full { 
            width: 100%; 
            padding: 15px; 
            background-color: var(--success-color); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
        }
        .geo-btn-full:hover { background-color: #218838; }
        .geo-btn-full:active { background-color: #1e7e34; transform: translateY(1px); }
        /* ----------------------------------- */

        /* Botones generales */
        .btn-main { width: 100%; padding: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: background 0.3s; }
        .btn-main:hover { background-color: #0056b3; }
        
        .btn-export { width: 100%; padding: 12px; background-color: #ffc107; color: #212529; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }

        /* Barra inferior */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background-color: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -2px 5px rgba(0,0,0,0.05); z-index: 100; }
        .nav-item { background: none; border: none; font-size: 16px; color: var(--secondary-color); cursor: pointer; padding: 10px; }
        .nav-item.active { color: var(--primary-color); font-weight: bold; }

        /* Listado */
        #listadoRegistros { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 10px; }
        .registro-card { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee;}
        .registro-header { font-size: 12px; color: #888; margin-bottom: 4px;}
        .registro-main { font-weight: bold; color: #333;}
    </style>
</head>
<body>

<div class="container">
    
    <div id="screen-captura" class="screen active">
        <h2>Capturar Registro</h2>
        <form id="frmInventario">
            <div class="form-group">
                <label>ID Registro (Auto):</label>
                <input type="text" id="itemId" readonly placeholder="Nuevo">
            </div>

            <div class="form-group">
                <label>Ubicacion (Lat, Long | Precision):</label>
                <div class="geo-inputs-row">
                    <input type="text" id="coordenadas" readonly placeholder="Coordenadas">
                    <input type="text" id="precision" readonly placeholder="Prec.">
                </div>
                <button type="button" class="geo-btn-full" onclick="capturarGPS()">
                    📍 Capturar Coordenadas GPS
                </button>
            </div>
            <div class="form-group"><label>Circuito:</label><input type="text" id="circuito" required></div>
            <div class="form-group"><label>Seccion:</label><input type="text" id="seccion"></div>

            <div class="form-group">
                <label>Tipo de Conexion:</label>
                <select id="tipoConexion">
                    <option value="Paso">Paso</option>
                    <option value="Amarre">Amarre</option>
                </select>
            </div>

            <div class="form-group"><label>Direccion:</label><input type="text" id="direccion"></div>
            <div class="form-group"><label>Equipo Instalado:</label><input type="text" id="equipo"></div>
            <div class="form-group"><label>Tipo de Banco:</label><input type="text" id="tipoBanco"></div>
            <div class="form-group"><label>KVA Instalado:</label><input type="number" step="0.1" id="kva"></div>
            
            <div class="form-group"><label>I1 (A):</label><input type="number" step="0.1" id="i1"></div>
            <div class="form-group"><label>I2 (A):</label><input type="number" step="0.1" id="i2"></div>
            <div class="form-group"><label>I3 (A):</label><input type="number" step="0.1" id="i3"></div>
            <div class="form-group"><label>I Neutro (A):</label><input type="number" step="0.1" id="ineutro"></div>

            <button type="submit" class="btn-main">Guardar Registro Localmente</button>
        </form>
    </div>

    <div id="screen-exportar" class="screen">
        <h2>Exportar Datos</h2>
        <p>Registros guardados en este dispositivo: <b id="contadorRegistros">0</b></p>
        
        <button class="btn-export" onclick="exportarCSV()">Exportar como CSV (Excel)</button>
        <button class="btn-export" onclick="exportarJSON()" style="background-color: #17a2b8; color: white;">Exportar como JSON</button>
        
        <div id="listadoRegistros"></div>
    </div>

</div>

<nav class="bottom-nav">
    <button class="nav-item active" id="btn-nav-captura" onclick="switchScreen('captura')">Capturar</button>
    <button class="nav-item" id="btn-nav-exportar" onclick="switchScreen('exportar')">Exportar</button>
</nav>

<script>
    // Config DB
    const db = new Dexie("InventarioElectricoDB");
    db.version(1).stores({
        registros: '++id, circuito, coordenadas, fecha'
    });

    // Navegacion
    function switchScreen(screenName) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById(`screen-${screenName}`).classList.add('active');
        if(screenName === 'captura') document.getElementById('btn-nav-captura').classList.add('active');
        else document.getElementById('btn-nav-exportar').classList.add('active');

        if(screenName === 'exportar') actualizarListaExportar();
    }

    // Logica GPS
    function capturarGPS() {
        const inputCoords = document.getElementById('coordenadas');
        const inputPrec = document.getElementById('precision');
        const btnGps = document.querySelector('.geo-btn-full');

        inputCoords.value = "Capturando...";
        inputPrec.value = "...";
        btnGps.disabled = true;
        btnGps.innerText = "⏳ Obteniendo señal...";

        if (!navigator.geolocation) {
            alert("Navegador no soporta GPS");
            restaurarBoton();
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude.toFixed(6);
                const lng = position.coords.longitude.toFixed(6);
                const acc = position.coords.accuracy.toFixed(1);
                inputCoords.value = `${lat}, ${lng}`;
                inputPrec.value = `${acc}m`;
                restaurarBoton();
            },
            (error) => {
                alert("Error al obtener ubicacion. Verifique permisos de GPS.");
                inputCoords.value = "";
                inputPrec.value = "";
                console.error(error);
                restaurarBoton();
            },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );

        function restaurarBoton() {
            btnGps.disabled = false;
            btnGps.innerHTML = "📍 Capturar Coordenadas GPS";
        }
    }

    // Guardar
    document.getElementById('frmInventario').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        if(!document.getElementById('coordenadas').value) {
            alert("Por favor caputure las coordenadas GPS antes de guardar.");
            return;
        }

        const nuevoRegistro = {
            coordenadas: document.getElementById('coordenadas').value,
            precision: document.getElementById('precision').value,
            circuito: document.getElementById('circuito').value,
            seccion: document.getElementById('seccion').value,
            tipoConexion: document.getElementById('tipoConexion').value,
            direccion: document.getElementById('direccion').value,
            equipo: document.getElementById('equipo').value,
            tipoBanco: document.getElementById('tipoBanco').value,
            kva: parseFloat(document.getElementById('kva').value) || 0,
            i1: parseFloat(document.getElementById('i1').value) || 0,
            i2: parseFloat(document.getElementById('i2').value) || 0,
            i3: parseFloat(document.getElementById('i3').value) || 0,
            ineutro: parseFloat(document.getElementById('ineutro').value) || 0,
            fecha: new Date().toISOString()
        };

        try {
            const idGen = await db.registros.add(nuevoRegistro);
            alert("Guardado con exito localmente. ID: " + idGen);
            document.getElementById('frmInventario').reset();
            document.getElementById('coordenadas').value = "";
            document.getElementById('precision').value = "";
        } catch (err) {
            alert("Error critico al guardar en base de datos.");
            console.error(err);
        }
    });

    // Vista Exportar
    async function actualizarListaExportar() {
        const contenedor = document.getElementById('listadoRegistros');
        const contador = document.getElementById('contadorRegistros');
        const datos = await db.registros.reverse().toArray();
        contador.innerText = datos.length;
        contenedor.innerHTML = "";
        
        datos.slice(0, 5).forEach(reg => {
            const div = document.createElement('div');
            div.className = 'registro-card';
            div.innerHTML = `<div class="registro-header">ID: ${reg.id} | Prec: ${reg.precision} | ${reg.fecha.split('T')[0]}</div>
                             <div class="registro-main">${reg.circuito} - ${reg.equipo}</div>`;
            contenedor.appendChild(div);
        });
        if(datos.length > 5) {
            contenedor.innerHTML += '<p style="text-align:center; font-size:12px; color:#888;">... ultimos 5 registros visualizados ...</p>';
        }
    }

    // Exportacion
    function descargar(contenido, nombre, tipo) {
        const blob = new Blob([contenido], { type: tipo });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = nombre;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    async function exportarCSV() {
        const datos = await db.registros.toArray();
        if(!datos.length) return alert("No hay datos para exportar");
        const headers = ["ID", "Fecha", "Coordenadas", "Precision", "Circuito", "Seccion", "Conexion", "Direccion", "Equipo", "TipoBanco", "KVA", "I1", "I2", "I3", "INeutro"];
        let csv = headers.join(";") + "\n";
        datos.forEach(r => {
            csv += [r.id, r.fecha, `"${r.coordenadas}"`, `"${r.precision}"`, `"${r.circuito}"`, `"${r.seccion}"`, r.tipoConexion, `"${r.direccion}"`, `"${r.equipo}"`, `"${r.tipoBanco}"`, r.kva, r.i1, r.i2, r.i3, r.ineutro].join(";") + "\n";
        });
        const f = new Date().toISOString().split('T')[0];
        descargar(csv, `inventario_${f}.csv`, "text/csv;charset=utf-8;");
    }

    async function exportarJSON() {
        const datos = await db.registros.toArray();
        if(!datos.length) return alert("No hay datos para exportar");
        const f = new Date().toISOString().split('T')[0];
        descargar(JSON.stringify(datos, null, 2), `inventario_${f}.json`, "application/json");
    }
</script>
</body>
</html>
