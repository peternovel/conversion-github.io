<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visualizador GeoJSON - Centro Promedio</title>
    
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.3.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.3.1/mapbox-gl.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden;
        }
        #map { flex: 1; width: 100%; }
        #sidebar {
            width: 100%; max-height: 40vh; background-color: #003399;
            color: white; padding: 15px; z-index: 1;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.3); overflow-y: auto;
        }
        @media (min-width: 768px) {
            body { flex-direction: row; }
            #sidebar { width: 320px; height: 100vh; max-height: 100vh; }
            #map { height: 100vh; }
        }
        .upload-btn {
            display: block; background-color: #00d4ff; color: #002266;
            padding: 15px; border-radius: 8px; cursor: pointer;
            font-weight: bold; width: 100%; margin: 10px 0; text-align: center;
        }
        input[type="file"] { display: none; }
        .filter-group { margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 8px; }
        .filter-item { display: flex; align-items: center; margin-bottom: 12px; font-size: 0.9rem; }
        .filter-item input { margin-right: 15px; width: 22px; height: 22px; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
    <h2>Levantamiento</h2>
    <p>Los puntos se centrarán en el promedio de sus coordenadas.</p>
    
    <label class="upload-btn" for="geojson-input">📁 Cargar archivo .json</label>
    <input type="file" id="geojson-input" accept=".geojson,.json">

    <div class="filter-group">
        <strong>Equipos:</strong>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 8px 0;">
        <div id="filters">
            <div class="filter-item"><input type="checkbox" class="filter-check" value="Partida principal" id="c1" checked><label for="c1">Partida principal</label></div>
            <div class="filter-item"><input type="checkbox" class="filter-check" value="Seccionador" id="c2" checked><label for="c2">Seccionador</label></div>
            <div class="filter-item"><input type="checkbox" class="filter-check" value="Transformador" id="c3" checked><label for="c3">Transformador</label></div>
            <div class="filter-item"><input type="checkbox" class="filter-check" value="Medicion MT" id="c4" checked><label for="c4">Medición MT</label></div>
            <div class="filter-item"><input type="checkbox" class="filter-check" value="Banco de condensadores" id="c5" checked><label for="c5">Banco de condensadores</label></div>
            <div class="filter-item"><input type="checkbox" class="filter-check" value="Sin equipo" id="c6" checked><label for="c6">Sin equipo</label></div>
        </div>
    </div>
    <p style="text-align: center; font-size: 0.7rem; margin-top: 15px;">Pedro Novelino</p>
</div>

<script>
    const db = new Dexie("GeoJSON_Map_DB");
    db.version(1).stores({ features: '++id, equipo' });

    mapboxgl.accessToken = 'pk.eyJ1IjoicGV0ZXJub3ZlbCIsImEiOiJjaWdyZm9tdHcwMXl2djFrb2xoMmdvOTMyIn0.4cQYxMt9fl5gDtvDmJz_1w';
    
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/light-v10', 
        center: [-68.31, 9.91], 
        zoom: 12
    });

    map.addControl(new mapboxgl.NavigationControl(), 'top-left');
    const geolocate = new mapboxgl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true },
        trackUserLocation: true,
        showUserHeading: true
    });
    map.addControl(geolocate, 'top-right');

    document.getElementById('geojson-input').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(event) {
            try {
                const data = JSON.parse(event.target.result);
                await db.features.clear();
                const itemsToStore = (data.features || []).map(f => ({
                    geometry: f.geometry,
                    properties: f.properties,
                    equipo: f.properties.equipo || "Sin equipo"
                }));
                await db.features.bulkAdd(itemsToStore);
                
                // Al cargar archivo nuevo, centramos en el promedio
                consultarYGraficar(true); 
            } catch (err) {
                alert("Error al procesar el archivo.");
            }
        };
        reader.readAsText(file);
    });

    document.querySelectorAll('.filter-check').forEach(ck => {
        ck.addEventListener('change', () => consultarYGraficar(false));
    });

    async function consultarYGraficar(centrarEnPromedio = false) {
        const selectedEquipos = Array.from(document.querySelectorAll('.filter-check:checked')).map(c => c.value);
        const records = await db.features.where('equipo').anyOf(selectedEquipos).toArray();
        
        if (records.length === 0) return;

        const geojson = {
            type: 'FeatureCollection',
            features: records.map(r => ({ type: 'Feature', geometry: r.geometry, properties: r.properties }))
        };

        renderGeoJSON(geojson);

        if (centrarEnPromedio) {
            let sumLng = 0;
            let sumLat = 0;
            let count = 0;

            records.forEach(r => {
                if (r.geometry && r.geometry.coordinates) {
                    sumLng += r.geometry.coordinates[0];
                    sumLat += r.geometry.coordinates[1];
                    count++;
                }
            });

            if (count > 0) {
                const avgLng = sumLng / count;
                const avgLat = sumLat / count;
                
                // Centrar suavemente en el promedio calculado
                map.flyTo({
                    center: [avgLng, avgLat],
                    zoom: 14,
                    essential: true
                });
            }
        }
    }

    function renderGeoJSON(data) {
        const sourceId = 'user-data';
        if (map.getSource(sourceId)) {
            map.getSource(sourceId).setData(data);
        } else {
            map.addSource(sourceId, { type: 'geojson', data: data });
            map.addLayer({
                id: 'route-points',
                type: 'circle',
                source: sourceId,
                paint: {
                    'circle-radius': 10,
                    'circle-color': '#ff5500',
                    'circle-stroke-width': 2,
                    'circle-stroke-color': '#ffffff'
                }
            });
            map.addLayer({
                id: 'point-labels',
                type: 'symbol',
                source: sourceId,
                layout: {
                    'text-field': ['get', 'id'],
                    'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
                    'text-size': 10,
                },
                paint: { 'text-color': '#ffffff' }
            });
        }
    }
</script>

</body>
</html>
