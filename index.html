<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversor Kg ↔ Metros | Exportador</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      margin: 0;
      background: #f3f6fb;
      color: #132039;
      padding-bottom: 50px;
    }
    .wrap {
      max-width: 650px;
      margin: 48px auto;
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(19, 32, 57, 0.12);
    }
    h1 { margin-top: 0; font-size: 1.4rem; color: #003399; }
    .grid-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .field { display: grid; gap: 6px; margin-bottom: 14px; }
    label { font-weight: 600; font-size: 0.9rem; }
    select, input {
      border: 1px solid #cad3e2;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
    }
    
    /* Botones */
    .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.3s;
      min-width: 140px;
    }
    .btn-add { background: #003399; color: white; }
    .btn-csv { background: #28a745; color: white; }
    .btn-json { background: #17a2b8; color: white; }
    button:hover { opacity: 0.8; }

    /* Tabla */
    .table-container { margin-top: 30px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
    th { background: #f8f9fa; }

    .note { margin-top: 12px; font-size: .9rem; color: #5c6d8b; font-style: italic; }
    .footer { text-align: center; margin-top: 20px; font-size: 0.8rem; opacity: 0.7; }
  </style>
</head>
<body>

  <main class="wrap">
    <h1>Calculador y Exportador de Levantamiento</h1>
    
    <div class="grid-fields">
      <div class="field">
        <label>Material</label>
        <select id="material">
          <option value="aluminio">Aluminio</option>
          <option value="cobre">Cobre</option>
        </select>
      </div>
      <div class="field">
        <label>Calibre</label>
        <select id="calibre">
          <option value="4">#4</option>
          <option value="2">#2</option>
          <option value="1/0">1/0</option>
          <option value="2/0">2/0</option>
          <option value="3/0">3/0</option>
          <option value="4/0">4/0</option>
        </select>
      </div>
    </div>

    <div class="grid-fields">
      <div class="field">
        <label>Metros</label>
        <input type="number" id="metros" step="0.01" placeholder="0.00" />
      </div>
      <div class="field">
        <label>Kilos (kg)</label>
        <input type="number" id="kilos" step="0.01" placeholder="0.00" />
      </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
    <p style="font-size: 0.8rem; font-weight: bold; margin-bottom: 10px;">UBICACIÓN (Para GeoJSON)</p>
    
    <div class="grid-fields">
      <div class="field">
        <label>Latitud</label>
        <input type="number" id="lat" step="0.000001" placeholder="0.000000" />
      </div>
      <div class="field">
        <label>Longitud</label>
        <input type="number" id="lng" step="0.000001" placeholder="0.000000" />
      </div>
    </div>

    <div class="note" id="factorInfo"></div>

    <div class="btn-group">
      <button class="btn-add" onclick="agregarRegistro()">+ Guardar Punto</button>
      <button class="btn-csv" onclick="exportarCSV()">Exportar CSV</button>
      <button class="btn-json" onclick="exportarGeoJSON()">Exportar GeoJSON</button>
    </div>

    <div class="table-container">
      <table id="tablaRegistros">
        <thead>
          <tr>
            <th>Mat.</th>
            <th>Cal.</th>
            <th>Mts.</th>
            <th>Kg.</th>
            <th>Coord.</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="footer">
      <p>Por Pedro Novelino</p>
    </div>
  </main>

  <script>
    const kgPorMetro = {
      aluminio: { '4': 0.057, '2': 0.108, '1/0': 0.172, '2/0': 0.217, '3/0': 0.230, '4/0': 0.345 },
      cobre: { '4': 0.189, '2': 0.301, '1/0': 0.479, '2/0': 0.604, '3/0': 0.762, '4/0': 0.961 }
    };

    let registros = [];

    const materialEl = document.getElementById('material');
    const calibreEl = document.getElementById('calibre');
    const metrosEl = document.getElementById('metros');
    const kilosEl = document.getElementById('kilos');
    const latEl = document.getElementById('lat');
    const lngEl = document.getElementById('lng');
    const factorInfoEl = document.getElementById('factorInfo');

    function getFactor() { return kgPorMetro[materialEl.value][calibreEl.value]; }

    function updateFactorInfo() {
      const factor = getFactor();
      factorInfoEl.textContent = `Factor: ${factor.toFixed(3)} kg/m`;
    }

    metrosEl.addEventListener('input', () => {
      const v = parseFloat(metrosEl.value);
      kilosEl.value = isNaN(v) ? '' : (v * getFactor()).toFixed(3);
    });

    kilosEl.addEventListener('input', () => {
      const v = parseFloat(kilosEl.value);
      metrosEl.value = isNaN(v) ? '' : (v / getFactor()).toFixed(3);
    });

    function agregarRegistro() {
      if (!metrosEl.value || !latEl.value || !lngEl.value) {
        alert("Por favor completa Metros, Latitud y Longitud.");
        return;
      }

      const reg = {
        material: materialEl.value,
        calibre: calibreEl.value,
        metros: metrosEl.value,
        kilos: kilosEl.value,
        lat: parseFloat(latEl.value),
        lng: parseFloat(lngEl.value)
      };

      registros.push(reg);
      actualizarTabla();
    }

    function actualizarTabla() {
      const tbody = document.querySelector('#tablaRegistros tbody');
      tbody.innerHTML = '';
      registros.forEach(r => {
        const row = `<tr>
          <td>${r.material}</td>
          <td>${r.calibre}</td>
          <td>${r.metros}</td>
          <td>${r.kilos}</td>
          <td>${r.lat.toFixed(4)}, ${r.lng.toFixed(4)}</td>
        </tr>`;
        tbody.innerHTML += row;
      });
    }

    // --- FUNCIONES DE EXPORTACIÓN ---

    function descargarArchivo(contenido, nombreArchivo, tipoMime) {
      const blob = new Blob([contenido], { type: tipoMime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = nombreArchivo;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportarCSV() {
      if (registros.length === 0) return alert("No hay datos para exportar");
      let csv = "Material,Calibre,Metros,Kilos,Latitud,Longitud\n";
      registros.forEach(r => {
        csv += `${r.material},${r.calibre},${r.metros},${r.kilos},${r.lat},${r.lng}\n`;
      });
      descargarArchivo(csv, "levantamiento.csv", "text/csv");
    }

    function exportarGeoJSON() {
      if (registros.length === 0) return alert("No hay datos para exportar");
      const geojson = {
        type: "FeatureCollection",
        features: registros.map(r => ({
          type: "Feature",
          geometry: { type: "Point", coordinates: [r.lng, r.lat] },
          properties: {
            material: r.material,
            calibre: r.calibre,
            metros: r.metros,
            kilos: r.kilos
          }
        }))
      };
      descargarArchivo(JSON.stringify(geojson, null, 2), "levantamiento.geojson", "application/json");
    }

    [materialEl, calibreEl].forEach(el => el.addEventListener('change', updateFactorInfo));
    updateFactorInfo();
  </script>
</body>
</html>
